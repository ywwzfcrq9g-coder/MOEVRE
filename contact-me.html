  <!-- ===== CONTACT =====
       <main> omsluter sidans primara innehall. -->
  <main>
    <div class="container">
      <section>

      <h1 class="contact-title">Contact Me</h1>

      <!-- <form> ar semantiskt korrekt element for formularet.
           action="#" ar platshallare - byts mot server-endpoint vid driftsattning.
           method="post" skickar data sakert utan att visa det i URL:en. -->
      <form class="contact-form" action="#" method="post">

        <!-- type="text" ar korrekt for namnfalt.
             autocomplete forbattrar UX och tillgangligheten. -->
        <input
          type="text"
          name="name"
          placeholder="Name"
          required
          autocomplete="name"
        />

        <!-- type="email" ger inbyggd e-postvalidering i webblasaren -->
        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          autocomplete="email"
        />

        <!-- textarea ar korrekt for langre fritext.
             resize: vertical i CSS later anvandaren justera hojden. -->
        <textarea
          name="message"
          rows="5"
          placeholder="Message"
          required
        ></textarea>

        <!-- type="submit" skickar formularet -->
        <button type="submit" class="submit-btn">Submit</button>

      </form>
      </section>
    </div>
  </main>
