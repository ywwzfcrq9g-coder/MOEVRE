  <!-- ===== JAVASCRIPT =====
       Hamburger-meny: classList.toggle lagger till/tar bort .open-klassen.
       aria-expanded uppdateras for tillganglighet. -->
  <script>
    function toggleMenu() {
      var nav = document.getElementById('main-nav');
      var btn = document.querySelector('.hamburger');
      var open = nav.classList.toggle("open");
      btn.setAttribute("aria-expanded", String(open));
    }

    /* ---- Hover preview ---- */
    (function () {
      if (window.matchMedia('(hover: none)').matches) return; // skip touch devices

      var preview = document.createElement('div');
      preview.id = 'card-preview';
      preview.innerHTML =
        '<img id="card-preview__img" alt="" />' +
        '<div id="card-preview__body">' +
          '<p id="card-preview__meta"></p>' +
          '<p id="card-preview__title"></p>' +
          '<p id="card-preview__desc"></p>' +
          '<p id="card-preview__arrow">View project →</p>' +
        '</div>';
      document.body.appendChild(preview);

      var pImg   = document.getElementById('card-preview__img');
      var pMeta  = document.getElementById('card-preview__meta');
      var pTitle = document.getElementById('card-preview__title');
      var pDesc  = document.getElementById('card-preview__desc');
      var rafId;

      function position(x, y) {
        var pw = preview.offsetWidth  || 280;
        var ph = preview.offsetHeight || 280;
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var left = x + 24;
        var top  = y - ph / 2;
        if (left + pw > vw - 16) left = x - pw - 24;
        if (top < 16)            top  = 16;
        if (top + ph > vh - 16)  top  = vh - ph - 16;
        preview.style.left = left + 'px';
        preview.style.top  = top  + 'px';
      }

      document.querySelectorAll('.big-card').forEach(function (card) {
        var img = card.querySelector('.card-image');

        card.addEventListener('mouseenter', function (e) {
          pImg.src       = img.src;
          pMeta.textContent  = card.dataset.meta  || '';
          pTitle.textContent = card.querySelector('.card-title').textContent;
          pDesc.textContent  = card.dataset.desc  || '';
          position(e.clientX, e.clientY);
          preview.classList.add('visible');
        });

        card.addEventListener('mousemove', function (e) {
          cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(function () { position(e.clientX, e.clientY); });
        });

        card.addEventListener('mouseleave', function () {
          preview.classList.remove('visible');
        });
      });
    })();
  </script>
